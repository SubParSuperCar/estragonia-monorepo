name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.set.outputs.projects }}

    steps:
      - uses: actions/checkout@v6

      - id: set
        run: |
          projects=$(find src -name "*.csproj" | xargs -n1 dirname | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "projects=$projects" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.project }} (${{ matrix.configuration }})
    runs-on: ubuntu-latest
    needs: discover

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        project: ${{ fromJson(needs.discover.outputs.projects) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'NuGet.config') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} --no-restore --configuration ${{ matrix.configuration }}

      - name: Test
        if: matrix.configuration == 'Release'
        run: dotnet test ${{ matrix.project }} --no-build --no-restore --configuration Release

  archive:
    name: Archive src/
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Archive
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --prefix=src/ \
            --output=dist/src_${{ github.sha }}.zip \
            HEAD:src

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: src-${{ github.sha }}
          path: dist/src_${{ github.sha }}.zip
          retention-days: 30
