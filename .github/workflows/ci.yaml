name: CI

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build (${{ matrix.project }} | ${{ matrix.configuration }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        configuration: [ Debug, Release ]
        project:
          - Estragonia
          - GameMenu
          - GameTemplate
          - HelloWorld

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: src/**/*.csproj

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration ${{ matrix.configuration }}

  archive-src:
    name: Archive src/
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() && github.event_name == 'push' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Archive .zip
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --prefix=src/ \
            --output=dist/src_${{ github.sha }}.zip \
            HEAD:src

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: src-${{ github.sha }}
          path: dist/src_${{ github.sha }}.zip
          retention-days: 30
